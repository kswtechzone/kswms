name: Deploy Next.js Frontend to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy Static Site to cPanel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Export Next.js Static Site
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://hospitalitybackend-production.up.railway.app

      - name: Verify Build Output and Safeguards
        run: |
          echo "=== Verifying Build Directory ==="
          if [ ! -d "./out" ]; then
            echo "ERROR: './out' directory does not exist! Build failed."
            exit 1
          fi
          
          echo "=== Verifying index.html ==="
          if [ ! -f "./out/index.html" ]; then
            echo "ERROR: './out/index.html' is missing! Static export failed."
            exit 1
          fi

          echo "=== Verifying Safeguards ==="
          if [ -d "./out/.next" ] || [ -d "./out/node_modules" ]; then
            echo "ERROR: Security leak detected! Production static export directory contains development source folders."
            exit 1
          fi
          
          echo "=== Directory Structure of Output ==="
          ls -la ./out
          
          echo "Build verification successful!"

      - name: Sync Static out Folder to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.109.25.210
          username: kswms@kswtechzone.com.np
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./out/
          server-dir: ./
