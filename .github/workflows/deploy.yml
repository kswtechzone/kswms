name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /apps/kswms
            
            # Pull latest changes
            git pull origin main
            
            # Install all dependencies at once using workspaces
            npm install
            
            # Backend build using workspaces
            npm run prisma:generate -w backend
            npm run build -w backend
            
            # Frontend build with memory constraints to prevent OOM on VPS
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build -w frontend
            
            # Prepare standalone output
            mkdir -p frontend/.next/standalone/frontend/.next

            # Preserve old static chunks so cached browsers don't 404 on renamed chunks
            if [ -d frontend/.next/standalone/frontend/.next/static ]; then
              cp -r frontend/.next/standalone/frontend/.next/static frontend/.next/static-old
            fi

            # Copy fresh build assets into the standalone output
            cp -r frontend/public frontend/.next/standalone/frontend/public
            cp -r frontend/.next/static frontend/.next/standalone/frontend/.next/static

            # Merge back any old static files that the new build doesn't have
            if [ -d frontend/.next/static-old ]; then
              cp -rn frontend/.next/static-old/. frontend/.next/standalone/frontend/.next/static/
              rm -rf frontend/.next/static-old
            fi
            
            # Restart PM2
            pm2 restart ecosystem.config.js
