name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /apps/kswms
            
            # Pull latest changes
            git pull origin main
            
            # Install all dependencies at once using workspaces
            npm install
            
            # Backend build using workspaces
            npm run prisma:generate -w backend
            npm run build -w backend
            
            # Frontend build with memory constraints to prevent OOM on VPS
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build -w frontend
            
            # Copy assets for frontend standalone output
            cp -r frontend/public frontend/.next/standalone/
            cp -r frontend/.next/static frontend/.next/standalone/.next/
            
            # Restart PM2
            pm2 restart ecosystem.config.js
